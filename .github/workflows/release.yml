name: Release
on:
  push:
    tags:
      - 'v*'
    branches:
      - main
    paths:
      - '.release-version'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=$(cat .release-version | tr -d '[:space:]]')" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push tag (file-triggered)
        if: github.ref_type != 'tag'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "Tag ${{ steps.version.outputs.tag }} already exists, skipping creation."
          else
            git tag ${{ steps.version.outputs.tag }}
            git push origin ${{ steps.version.outputs.tag }}
          fi

      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Install gorelease
        run: go install github.com/tinywasm/devflow/cmd/gorelease@latest

      - name: Configure gh credentials
        run: |
          mkdir -p ~/.config/gh
          printf 'github.com:\n  oauth_token: %s\n  git_protocol: https\n  user: github-actions[bot]\n' "${GH_TOKEN}" > ~/.config/gh/hosts.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        run: gorelease ${{ steps.version.outputs.tag }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
