name: Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v0.3.0)'
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and push tag (dispatch only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ github.event.inputs.version }}
          git push origin ${{ github.event.inputs.version }}

      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Install gorelease
        run: go install github.com/tinywasm/devflow/cmd/gorelease@latest

      - name: Create Release
        run: |
          TAG=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || github.ref_name }}
          gorelease "$TAG"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
